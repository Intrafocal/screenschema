component:
  name: toggle_row
  description: "Settings row with a label and a toggle switch"

  props:
    label:
      type: string
      required: true
    value_id:
      type: string
      required: true
      description: "SSContext id for the toggle state"
    checked:
      type: boolean
      default: false
    on_change:
      type: handler
      default: null

  size: ["LV_PCT(100)", 48]

  template:
    - type: label
      id: "{{id}}_label"
      text: "{{label}}"
      align: left_mid
      offset: [12, 0]
      style:
        font: roboto_16
        color: "#FFFFFF"
    - type: toggle
      id: "{{value_id}}"
      checked: "{{checked}}"
      align: right_mid
      offset: [-12, 0]
      on_change: "{{on_change}}"
